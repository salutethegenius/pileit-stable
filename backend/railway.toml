# Use with GitHub repo root + Railway service **Root Directory** set to `backend`.
# Add a PostgreSQL plugin and link it so `DATABASE_URL` is injected.

[build]
builder = "nixpacks"

[deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 120
