# Use with GitHub repo root + Railway service **Root Directory** set to `backend`.
# Add a PostgreSQL plugin and link it so `DATABASE_URL` is injected.

[build]
builder = "nixpacks"

[deploy]
# Shell form so $PORT is always expanded (some builders omit it on a bare uvicorn argv).
startCommand = "sh -c 'exec uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}'"
healthcheckPath = "/health"
healthcheckTimeout = 120
